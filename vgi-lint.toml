# vgi-lint-check configuration for the vgi-netflow worker.
#
# The catalog `source_url` (→ the GitHub repo), the classifying schema tags
# (domain / category / topic), titles, doc_llm / doc_md, keywords, per-argument
# docs, example_queries, result-column docs, and the executable_examples payload
# are all emitted from the worker's catalog + FunctionMetadata
# (crates/netflow-worker/src/**), which the linter reads over VGI.
#
# Execution is ON in `run` mode: every function ships a self-contained,
# INET-free `vgi.executable_examples` (and a native Meta.example) that decodes an
# inline hex sample datagram — built from netflow-core's golden fixtures — so the
# linter RUNS each one against the attached worker with no external files or
# `LOAD inet`. `templates()` uses a two-statement example (decode → introspect)
# so it returns rows on a cold worker. The real-world `read_blob(...)` + `::INET`
# archive pattern (which needs the inet extension + capture files, neither
# present in the lint sandbox) lives in the worker's prose docs and is exercised
# for real by the haybarn SQLLogic E2E (test/sql/*.test) across the subprocess +
# unix + HTTP transports.
#
# Every rule — static metadata AND example execution — gates at --fail-on info.
[tool.vgi-lint-check]
select = ["ALL"]
fail_on = "info"

[tool.vgi-lint-check.execution]
enabled = true
mode = "run"

